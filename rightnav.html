<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="style.css">
<style>
body{margin:0;background:#eef4fb;font-family:Arial,sans-serif;height:100vh;box-sizing:border-box;display:flex;flex-direction:column;overflow:hidden;}
.rn-wrap{display:flex;flex-direction:column;height:100%;padding:10px;box-sizing:border-box;gap:8px;}
.rn-title{font-size:13px;font-weight:bold;color:#023e8a;text-align:center;margin:0;border-bottom:2px solid #023e8a;padding-bottom:6px;}
.nav-links{display:flex;flex-direction:column;gap:5px;}
.nav-btn{display:block;padding:9px 10px;background:#023e8a;color:white;border-radius:6px;text-decoration:none;font-weight:bold;font-size:12px;text-align:center;}
.nav-btn:hover{background:#0077b6;color:white;}
.clock-wrap{display:flex;flex-direction:column;align-items:center;background:white;border-radius:10px;padding:10px 8px 8px;box-shadow:0 2px 8px rgba(0,0,0,0.12);flex:1;}
.clock-wrap .clk-top{display:flex;flex-direction:column;align-items:center;width:100%;}
#timestr{font-size:15px;color:#023e8a;font-weight:bold;font-family:'Courier New',monospace;margin-bottom:6px;}
#datestr{font-size:10px;color:#555;margin-bottom:8px;}
#cl{border-radius:50%;display:block;}
</style>
</head>
<body>
<div class="rn-wrap">
<p class="rn-title">Explore</p>
<div class="nav-links">
<a href="gallery.html" target="content" class="nav-btn">Tourist Gallery</a>
<a href="search.html" target="content" class="nav-btn">Search Places</a>
<a href="tips.html" target="content" class="nav-btn">Local Tips</a>
<a href="culture.html" target="content" class="nav-btn">Cultural Info</a>
<a href="planner.html" target="content" class="nav-btn" style="background:#2dc653;">Trip Planner</a>
</div>
<div class="clock-wrap">
<div class="clk-top">
<span id="timestr">00:00:00</span>
<span id="datestr"></span>
</div>
<canvas id="cl" width="140" height="140"></canvas>
</div>
</div>
<script src="script.js"></script>
</body>
</html>
